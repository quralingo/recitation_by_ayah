<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quran Recitation API Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }

    .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    label { font-size: 0.8rem; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
    input[type=text] { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }
    input[type=text]:focus { outline: none; border-color: #6366f1; }

    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 16px; }
    button {
      padding: 10px 22px; border: none; border-radius: 7px; font-size: 0.95rem;
      font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    #btn-record { background: #ef4444; color: #fff; }
    #btn-stop   { background: #6366f1; color: #fff; }
    #btn-analyze { background: #10b981; color: #fff; }

    .recording-indicator {
      display: none; align-items: center; gap: 8px;
      font-size: 0.85rem; color: #ef4444; font-weight: 600;
    }
    .recording-indicator.active { display: flex; }
    .dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    #status { font-size: 0.88rem; color: #555; margin-top: 12px; min-height: 20px; }
    #status.error { color: #ef4444; }
    #status.success { color: #10b981; }

    audio { display: block; width: 100%; margin-top: 12px; }

    /* Results */
    .result-section { display: none; }
    .verse-box {
      background: #fefce8; border: 1px solid #fde68a; border-radius: 8px;
      padding: 14px 18px; margin-bottom: 14px;
    }
    .verse-text { font-size: 1.5rem; direction: rtl; text-align: right; font-family: 'Amiri', serif; margin-bottom: 6px; }
    .verse-ref  { font-size: 0.82rem; color: #92400e; }

    .perfect { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 14px 18px; color: #166534; font-weight: 600; }

    .errors-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .errors-table th { background: #f9fafb; text-align: left; padding: 8px 10px; border-bottom: 2px solid #e5e7eb; }
    .errors-table td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
    .errors-table tr:hover td { background: #fafafa; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.78rem; font-weight: 600;
    }
    .badge-tajweed  { background: #fef3c7; color: #92400e; }
    .badge-normal   { background: #fee2e2; color: #991b1b; }
    .badge-tashkeel { background: #ede9fe; color: #5b21b6; }
    .badge-replace  { background: #fce7f3; color: #9d174d; }
    .badge-insert   { background: #d1fae5; color: #065f46; }
    .badge-delete   { background: #fee2e2; color: #991b1b; }

    .phoneme { font-family: monospace; font-size: 1.1rem; direction: rtl; }
    .phoneme.expected { color: #10b981; }
    .phoneme.predicted { color: #ef4444; }

    .rule-tag { font-size: 0.78rem; color: #6366f1; }

    details { margin-top: 14px; }
    summary { cursor: pointer; font-size: 0.85rem; color: #6366f1; font-weight: 600; }
    pre { background: #1e1e2e; color: #cdd6f4; padding: 14px; border-radius: 8px; font-size: 0.8rem; overflow-x: auto; margin-top: 8px; white-space: pre-wrap; }

    .spinner {
      display: none; width: 18px; height: 18px; border: 3px solid #e5e7eb;
      border-top-color: #6366f1; border-radius: 50%; animation: spin .7s linear infinite;
    }
    .spinner.active { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>Quran Recitation API Tester</h1>
<p class="subtitle">Record from your microphone and get tajweed feedback from the deployed API.</p>

<!-- Config -->
<div class="card">
  <label for="api-url">API Base URL</label>
  <input type="text" id="api-url" value="https://recite-ayah.quranlingo.app" spellcheck="false">

  <div class="controls">
    <button id="btn-record">⏺ Start Recording</button>
    <button id="btn-stop" disabled>⏹ Stop</button>
    <button id="btn-analyze" disabled>▶ Analyze</button>
    <div class="spinner" id="spinner"></div>
    <div class="recording-indicator" id="rec-indicator">
      <div class="dot"></div> Recording… <span id="rec-timer">0s</span>
    </div>
  </div>

  <audio id="audio-preview" controls style="display:none"></audio>
  <div id="status"></div>
</div>

<!-- Results -->
<div class="card result-section" id="result-section">
  <h2 style="font-size:1.05rem; margin-bottom:14px;">Analysis Result</h2>

  <div id="result-verse" class="verse-box" style="display:none">
    <div class="verse-text" id="verse-text"></div>
    <div class="verse-ref"  id="verse-ref"></div>
  </div>

  <div id="result-perfect" class="perfect" style="display:none">
    ✓ No errors detected — recitation matches the reference perfectly.
  </div>

  <div id="result-errors" style="display:none">
    <p style="font-size:.88rem; color:#555; margin-bottom:10px;">
      <strong id="error-count"></strong> error(s) found:
    </p>
    <table class="errors-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Type</th>
          <th>Expected</th>
          <th>Detected</th>
          <th>Rule</th>
        </tr>
      </thead>
      <tbody id="errors-tbody"></tbody>
    </table>
  </div>

  <details>
    <summary>Raw JSON response</summary>
    <pre id="raw-json"></pre>
  </details>
</div>

<script>
  const btnRecord  = document.getElementById('btn-record');
  const btnStop    = document.getElementById('btn-stop');
  const btnAnalyze = document.getElementById('btn-analyze');
  const spinner    = document.getElementById('spinner');
  const status     = document.getElementById('status');
  const recInd     = document.getElementById('rec-indicator');
  const recTimer   = document.getElementById('rec-timer');
  const audioPreview = document.getElementById('audio-preview');

  let mediaRecorder, chunks = [], audioBlob, timerInterval;
  let activeMimeType = 'audio/webm';

  // Pick the best MIME type the current browser actually supports
  function pickMimeType() {
    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/ogg;codecs=opus',
      'audio/mp4',
    ];
    for (const t of candidates) {
      if (MediaRecorder.isTypeSupported(t)) return t;
    }
    return '';  // browser default
  }

  // Derive a file extension from the MIME type so ffmpeg on the server can identify the format
  function mimeToExt(mime) {
    if (mime.includes('mp4'))  return 'mp4';
    if (mime.includes('ogg'))  return 'ogg';
    return 'webm';
  }

  function setStatus(msg, type = '') {
    status.textContent = msg;
    status.className = type;
  }

  // ── Record ──────────────────────────────────────────────────────────────────
  btnRecord.onclick = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      chunks = [];
      activeMimeType = pickMimeType();
      mediaRecorder = new MediaRecorder(stream, activeMimeType ? { mimeType: activeMimeType } : {});
      activeMimeType = mediaRecorder.mimeType;  // read back what the browser actually chose
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.start(100);

      btnRecord.disabled = true;
      btnStop.disabled   = false;
      btnAnalyze.disabled = true;
      recInd.classList.add('active');
      audioPreview.style.display = 'none';
      document.getElementById('result-section').style.display = 'none';

      let secs = 0;
      timerInterval = setInterval(() => { recTimer.textContent = `${++secs}s`; }, 1000);
      setStatus('Recording…');
    } catch (e) {
      setStatus('Microphone access denied: ' + e.message, 'error');
    }
  };

  // ── Stop ────────────────────────────────────────────────────────────────────
  btnStop.onclick = () => {
    mediaRecorder.stop();
    clearInterval(timerInterval);
    recInd.classList.remove('active');
    mediaRecorder.stream.getTracks().forEach(t => t.stop());

    mediaRecorder.onstop = () => {
      audioBlob = new Blob(chunks, { type: activeMimeType });
      audioPreview.src = URL.createObjectURL(audioBlob);
      audioPreview.style.display = 'block';
      btnRecord.disabled  = false;
      btnStop.disabled    = true;
      btnAnalyze.disabled = false;
      setStatus(`Recording ready (${(audioBlob.size / 1024).toFixed(0)} KB, ${activeMimeType}). Press Analyze to send.`, 'success');
    };
  };

  // ── Analyze ─────────────────────────────────────────────────────────────────
  btnAnalyze.onclick = async () => {
    if (!audioBlob) return;

    const apiUrl = document.getElementById('api-url').value.replace(/\/$/, '');
    const formData = new FormData();
    const ext = mimeToExt(activeMimeType);
    formData.append('file', audioBlob, `recording.${ext}`);

    btnAnalyze.disabled = true;
    spinner.classList.add('active');
    setStatus('Sending to API…');

    try {
      const res = await fetch(`${apiUrl}/correct-recitation`, {
        method: 'POST',
        body: formData,
      });

      const data = await res.json();
      spinner.classList.remove('active');
      btnAnalyze.disabled = false;

      if (!res.ok) {
        setStatus(`API error ${res.status}: ${data.detail ?? JSON.stringify(data)}`, 'error');
        return;
      }

      renderResult(data);
      setStatus('Analysis complete.', 'success');
    } catch (e) {
      spinner.classList.remove('active');
      btnAnalyze.disabled = false;
      setStatus('Network error: ' + e.message, 'error');
    }
  };

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderResult(data) {
    const section = document.getElementById('result-section');
    section.style.display = 'block';

    // Raw JSON
    document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);

    // No-match response (message field, no start/end)
    if (data.message && !data.start) {
      document.getElementById('result-verse').style.display = 'none';
      document.getElementById('result-perfect').style.display = 'none';
      document.getElementById('result-errors').style.display = 'none';
      setStatus('No matching verse found: ' + data.message, 'error');
      return;
    }

    // Verse reference
    if (data.uthmani_text) {
      document.getElementById('verse-text').textContent = data.uthmani_text;
      const s = data.start;
      document.getElementById('verse-ref').textContent =
        `Surah ${s.sura_idx + 1}, Ayah ${s.aya_idx + 1}`;
      document.getElementById('result-verse').style.display = 'block';
    }

    // Errors
    const errors = data.errors ?? [];
    if (errors.length === 0) {
      document.getElementById('result-perfect').style.display = 'block';
      document.getElementById('result-errors').style.display  = 'none';
    } else {
      document.getElementById('result-perfect').style.display = 'none';
      document.getElementById('result-errors').style.display  = 'block';
      document.getElementById('error-count').textContent = errors.length;

      const tbody = document.getElementById('errors-tbody');
      tbody.innerHTML = '';
      errors.forEach((err, i) => {
        const rules = (err.ref_tajweed_rules ?? [])
          .map(r => `<span class="rule-tag">${r.name.en} (×${r.golden_len})</span>`)
          .join(' ');

        const lenHint = err.expected_len != null
          ? `<br><small style="color:#888">expected ${err.expected_len} counts, got ${err.predicted_len}</small>`
          : '';

        tbody.innerHTML += `
          <tr>
            <td style="color:#888">${i + 1}</td>
            <td>
              <span class="badge badge-${err.error_type}">${err.error_type}</span><br>
              <span class="badge badge-${err.speech_error_type}" style="margin-top:4px">${err.speech_error_type}</span>
            </td>
            <td><span class="phoneme expected">${err.expected_ph ?? '—'}</span>${lenHint}</td>
            <td><span class="phoneme predicted">${err.preditected_ph ?? '—'}</span></td>
            <td>${rules || '<span style="color:#ccc">—</span>'}</td>
          </tr>`;
      });
    }

    section.scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
