# nginx configuration for recite-ayah.quranlingo.app
#
# Two-phase life:
#   Phase 1 (initial): dummy self-signed cert used so nginx can start.
#                      certbot fetches the real cert via webroot challenge.
#   Phase 2 (normal):  real Let's Encrypt cert in place, nginx serves HTTPS.
#
# The config file itself never changes between phases — only the cert files
# on disk change (managed by init-ssl.sh and the certbot renewal container).

# ── HTTP: redirect to HTTPS ───────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name recite-ayah.quranlingo.app;
    return 301 https://$host$request_uri;
}

# ── HTTPS: proxy to App service ───────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name recite-ayah.quranlingo.app;

    # Cloudflare origin certificate (wildcard *.quranlingo.app, valid until 2041)
    # Files placed on the server by deploy/scripts/init-cloudflare-ssl.sh
    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;

    # Mozilla Intermediate TLS configuration (TLS 1.2 + 1.3, no DHE needed)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # HSTS (tell browsers to always use HTTPS for this domain)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Audio uploads: 15 s @ 16 kHz 16-bit mono WAV ≈ 480 KB; 20 MB gives ample headroom.
    client_max_body_size 20M;

    # CORS – required for mobile WebView and direct API calls
    add_header Access-Control-Allow-Origin  "*"                              always;
    add_header Access-Control-Allow-Methods "POST, GET, OPTIONS"             always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization"    always;

    location / {
        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass            http://app:8001;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;

        # Allow up to 2 min for GPU inference + phonetic search
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;
    }
}
