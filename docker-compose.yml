services:

  # ── ML Inference Engine ─────────────────────────────────────────────────────
  # Runs the Wav2Vec2-BERT model on the T4 GPU. Internal only (no ports exposed).
  engine:
    build:
      context: .
      dockerfile: deploy/Dockerfile.engine
    image: quran-muaalem-engine:latest
    env_file: .env
    environment:
      # Hardcoded GPU settings for the production instance
      ACCELERATOR: cuda
      DTYPE: bfloat16
    volumes:
      # Persist HuggingFace model weights across container restarts.
      # The 1.4 GB model downloads once on first start; subsequent starts are instant.
      - huggingface_cache:/cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    # start_period is long to accommodate the one-time model download (~10 min on slow link)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  # ── REST API App ────────────────────────────────────────────────────────────
  # Handles phonetic search, error comparison, and proxies ML calls to engine.
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile.app
    image: quran-muaalem-app:latest
    env_file: .env
    environment:
      ENGINE_URL: http://engine:8000/predict
    depends_on:
      engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  # Terminates TLS, enforces HTTPS, proxies to app:8001.
  # Config: deploy/nginx/nginx.conf
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped

  # ── Certificate Renewal ─────────────────────────────────────────────────────
  # Checks for certificate renewal every 12 hours.
  # Initial certificate is obtained via deploy/scripts/init-ssl.sh.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew loop: certbot renew exits 0 if nothing to renew, so this is safe.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  huggingface_cache:
  certbot_webroot:
  certbot_certs:
